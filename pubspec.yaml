name: healix_ai
description: "Offline-First AI Health Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Security
  flutter_secure_storage: ^9.2.4

  # HTTP & Networking
  http: ^1.3.0
  connectivity_plus: ^6.1.4

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^4.0.0

  # File Management
  file_picker: ^9.2.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # AI
  google_generative_ai: ^0.4.6

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  android_intent_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
